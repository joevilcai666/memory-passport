# Alembic configuration for the Memory Passport backend.
# The actual URL is injected from env.py (reads MP/DATABASE_URL) so the same
# config works in docker-compose, locally, and in tests.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
timezone = UTC

# A friendly default; env.py overrides this with the app DATABASE_URL.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# (none — we run ruff separately in CI/dev)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
