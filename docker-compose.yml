# Memory Passport credential-free local evaluation stack.
#
# The default hms-api service is a deterministic, HMS-compatible evaluator.
# Use docker-compose.real.yml to replace it with the vendored HMS API and add
# its worker after supplying real model and embedding credentials.
name: memory-passport

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_dev_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./docker/postgres-init.sh:/docker-entrypoint-initdb.d/10-init-mp-hms.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - mp-net

  hms-api:
    build:
      context: ./backend
    command: ["uvicorn", "app.demo_hms:app", "--host", "0.0.0.0", "--port", "18080"]
    restart: unless-stopped
    environment:
      DEMO_HMS_DATABASE_URL: postgresql+psycopg://${HMS_DB_USER:-hms}:${HMS_DB_PASSWORD:-hms_dev_password_change_me}@postgres:5432/${HMS_DB_NAME:-hms}
      HMS_API_TENANT_API_KEY: ${HMS_API_TENANT_API_KEY:-hms_tenant_luna_change_me}
    ports:
      - "127.0.0.1:${HMS_LOCAL_API_PORT:-18080}:18080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - mp-net

  mp-backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${MP_DB_USER:-mp}:${MP_DB_PASSWORD:-mp_dev_password_change_me}@postgres:5432/${MP_DB_NAME:-memory_passport}
      HMS_API_URL: http://hms-api:18080
      HMS_API_KEY: ${HMS_API_TENANT_API_KEY:-hms_tenant_luna_change_me}
      MP_MEMORY_ENGINE_MODE: demo
      MP_SEED_API_KEY: ${MP_SEED_API_KEY:-mp_sandbox_LK39sn8vQ4x2pR7wY1tBz0Hd}
      MP_HOST: 0.0.0.0
      MP_PORT: "8000"
      MP_LOG_LEVEL: ${MP_LOG_LEVEL:-info}
      MP_RUN_MIGRATIONS_ON_STARTUP: "true"
      MP_EXPORT_DIR: /var/lib/memory-passport/exports
      MP_EXPORT_TOKEN_TTL_SECONDS: ${MP_EXPORT_TOKEN_TTL_SECONDS:-900}
    volumes:
      - ./backend:/app
      - ./var/exports:/var/lib/memory-passport/exports
    ports:
      - "127.0.0.1:${MP_PORT:-8000}:8000"
    depends_on:
      hms-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - mp-net

networks:
  mp-net:
    driver: bridge
