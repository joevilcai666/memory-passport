# Memory Passport CI — mirrors the host-only steps of `make check`.
#
# What this runs (unit-only, fast):
#   1. Unix script portability validation
#   2. Restore failure-path tests
#   3. pnpm install + Vitest
#   4. pnpm lint + build
#   5. ruff check app tests
#   6. pytest -m 'not postgres and not hms and not compose'
#
# What this does NOT run (local-only, per issue #15):
#   - the final Docker Compose steps of `make check` — those require a
#     running postgres + hms-api and the full image build. `make check` remains
#     the authoritative gate for that integration coverage.
#
# The vendor/hms submodule is checked out (submodules: recursive) so a future
# real-HMS build step works without extra plumbing; it is unused by unit tests.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Lint, build & unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with vendor/hms submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate Unix script portability
        run: python3 scripts/check_line_endings.py

      - name: Test backup and restore reliability
        run: make test-backup test-restore

      # ---- Frontend (Next.js 16 + React 19) --------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Pinned for reproducibility (package.json has no packageManager field).
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Test frontend and gateway
        run: pnpm test

      - name: Frontend lint
        run: pnpm lint

      - name: Frontend build
        run: pnpm build

      # ---- Backend (FastAPI + SQLAlchemy) ----------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "backend[dev]"

      - name: Ruff lint
        working-directory: backend
        run: ruff check app tests

      - name: Unit tests (exclude integration markers)
        working-directory: backend
        run: pytest -m 'not postgres and not hms and not compose' -q
